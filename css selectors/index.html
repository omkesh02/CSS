<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>css selectors</title>
</head>
<body>
   <h1> css selectors</h1>
   <h2> 1. element selector</h2>
   <p>hi my name is omkesh</p>
   <p>hi my name is kabir</p>
   <p>hi my name is onkar</p>
   <br>
   <br>
   <br>
   <h2> 2. id selector</h2>
    <p id="om">hi my name is omkesh</p>
    <p id="onkar">onkar</p>
    <p id="kabir">kabir</p>
    <br>
    <br>    
    <br>
    <h2> 3. class selector</h2>
    <p class="team">hi my name is omkesh</p>
    <p class="team">hi my name is kabir</p>
    <p class="team">hi my name is onkar</p>
<br>
<br>
<br>
</body>
</html>
